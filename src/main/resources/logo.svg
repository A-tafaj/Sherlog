<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Sherlog">
  <title>Sherlog</title>

  <!-- Surface colour matches the app's dark theme. -->
  <rect width="512" height="512" rx="104" fill="#1C1B1F"/>

  <!-- Log lines: uneven widths read as text rather than a chart. The fourth
       runs through the centre of the lens, so the segment left visible inside
       the glass is the match — the whole point of the tool, in one shape. -->
  <g fill="#49454F">
    <rect x="84" y="132" width="200" height="26" rx="13"/>
    <rect x="84" y="186" width="278" height="26" rx="13"/>
    <rect x="84" y="240" width="164" height="26" rx="13"/>
  </g>
  <rect x="84" y="276" width="252" height="26" rx="13" fill="#B69DF8"/>
  <!-- A second line reaches into the lens too: one bar alone, centred in the
       glass, reads as a minus sign — "zoom out" — at small sizes. -->
  <rect x="84" y="330" width="240" height="26" rx="13" fill="#49454F"/>

  <!-- Halo in the background colour, painted under the lens, so the ring
       stays legible where it crosses the lines. -->
  <g fill="none" stroke="#1C1B1F" stroke-linecap="round">
    <circle cx="318" cy="300" r="104" stroke-width="66"/>
    <line x1="392" y1="374" x2="450" y2="432" stroke-width="70"/>
  </g>

  <!-- Faint glass tint. -->
  <circle cx="318" cy="300" r="104" fill="#B69DF8" opacity="0.10"/>

  <g fill="none" stroke="#B69DF8" stroke-linecap="round">
    <circle cx="318" cy="300" r="104" stroke-width="34"/>
    <line x1="392" y1="374" x2="450" y2="432" stroke-width="38"/>
  </g>
</svg>
