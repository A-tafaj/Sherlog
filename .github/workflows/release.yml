name: Release

# Two ways in:
#   workflow_dispatch — run by hand from the Actions tab while getting the
#     build green. Produces downloadable artifacts, creates no release.
#   push of a v* tag — the real thing: builds all four installers and
#     publishes them on a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other platforms when one fails — while debugging you
      # want to see every failure per run, not just the first.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            ext: deb
          - os: windows-latest
            name: windows-x64
            ext: msi
          - os: macos-latest
            name: macos-arm64
            ext: dmg
          # Apple Silicon builds won't run on Intel Macs, and plenty of
          # Android engineers are still on them.
          - os: macos-13
            name: macos-x64
            ext: dmg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # jpackage shells out to dpkg-deb/fakeroot to assemble a .deb.
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils

      - name: Package installer
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew packageDistributionForCurrentOS --no-daemon

      # Both Macs would otherwise emit an identically named Sherlog-1.0.0.dmg
      # and collide on the release page, so stamp the platform into the name.
      - name: Collect installer
        shell: bash
        run: |
          mkdir -p dist
          found=$(find build/compose/binaries -type f -name "*.${{ matrix.ext }}" | head -1)
          if [ -z "$found" ]; then
            echo "No .${{ matrix.ext }} produced — check the packaging step above."
            find build/compose/binaries -type f || true
            exit 1
          fi
          cp "$found" "dist/Sherlog-${{ matrix.name }}.${{ matrix.ext }}"
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: sherlog-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    # Manual runs stop after build; only a tag publishes anything.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
